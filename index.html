
<!DOCTYPE html>
<html>
<head>
    <title>My Simple Gallery</title>
    <style>
        body {
            background-color: #e6ccff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        h1 {
            color: #e279dd;
            text-align: center;
            margin-top: 2em;
            margin-bottom: 0.5em;
        }

        h3 {
            color: #cd6de0;
            margin-bottom: 0.2em;
        }

        img {
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 1em;
        }

        .image-container {
            text-align: center;
            margin-bottom: 2em;
        }

        center {
            display: block;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>My Image Gallery</h1>

    <div class="image-container">
        <h3>Image 1</h3>
        <img src="images/1.jpg" width="200">
    </div>

    <div class="image-container">
        <h3>Image 2</h3>
        <img src="images/2.jpg" width="200">
    </div>

    <div class="image-container">
        <h3>Image 3</h3>
        <img src="images/3.jpg" width="200">
    </div>

</body>
</html>
